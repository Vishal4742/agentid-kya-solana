name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-lint-and-test:
    name: Frontend - Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  backend-lint:
    name: Backend - Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Prettier check
        run: yarn lint

  anchor-build:
    name: Anchor - Verify IDL
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Verify committed IDL is present
        # The IDL is generated locally by `anchor build` and committed.
        # This step confirms it has not been accidentally deleted and is
        # consistent across the frontend and backend IDL copy.
        run: |
          test -f frontend/src/idl/agentid_program.json && echo "✅ frontend IDL present"
          test -f backend/idl/agentid_program.json && echo "✅ backend IDL present"
          diff frontend/src/idl/agentid_program.json backend/idl/agentid_program.json \
            && echo "✅ IDL files are identical" \
            || (echo "❌ IDL mismatch — run scripts/sync-idl.ps1 and commit" && exit 1)

  frontend-e2e:
    name: Frontend - E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm install --no-save @playwright/test wait-on
      - run: cd frontend && npx playwright install chromium --with-deps
      - run: cd frontend && npm run dev &
      - run: npx wait-on http://localhost:5173 --timeout 30000
      - run: cd frontend && npm run test:e2e -- --reporter=list
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
